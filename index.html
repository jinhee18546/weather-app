<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한국어 지역검색 날씨 앱</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>🌤️ 날씨 검색</h1>
      <p class="subtitle">
        한국어 지역명(예: 서울특별시, 강남구, 역삼동)도 검색할 수 있어요.
      </p>

      <!--
        검색 컨트롤 전체 영역
        - 입력창 + 자동완성 + 버튼을 한 그룹으로 묶습니다.
      -->
      <section class="search-area" aria-label="지역 검색 영역">
        <label for="cityInput">지역명</label>

        <!--
          입력창과 자동완성 드롭다운은 겹쳐서 보이도록 하나의 wrapper에 넣습니다.
        -->
        <div class="autocomplete-wrapper">
          <input
            id="cityInput"
            type="text"
            placeholder="예: 한국, 서울, 강남구, 역삼동"
            autocomplete="off"
            aria-autocomplete="list"
            aria-controls="autocompleteList"
            aria-expanded="false"
          />

          <!--
            자동완성 목록
            - 기본은 숨김 상태
            - JavaScript가 항목을 동적으로 추가합니다.
          -->
          <ul id="autocompleteList" class="autocomplete-list" role="listbox"></ul>
        </div>

        <button id="searchButton" type="button">검색</button>
      </section>

      <!-- 상태 안내 메시지: 검색 중, 안내 문구 등을 표시 -->
      <p id="statusMessage" class="status" aria-live="polite"></p>

      <!-- 에러 메시지: 사용자에게 실패 원인을 이해하기 쉽게 전달 -->
      <p id="errorMessage" class="error" role="alert"></p>

      <!--
        결과 카드
        - 지역명(상세 주소)
        - 다양한 날씨 지표 표시
      -->
      <section id="weatherResult" class="weather-card" aria-live="polite">
        <h2 id="placeName">지역을 검색해 주세요</h2>

        <div class="weather-grid">
          <p><strong>현재 온도</strong><span id="currentTemp">-</span></p>
          <p><strong>체감 온도</strong><span id="apparentTemp">-</span></p>
          <p><strong>최고 / 최저</strong><span id="maxMinTemp">-</span></p>
          <p><strong>날씨 상태</strong><span id="weatherDescription">-</span></p>
          <p><strong>강수 (확률/량)</strong><span id="precipitation">-</span></p>
          <p><strong>풍속</strong><span id="windSpeed">-</span></p>
          <p><strong>습도</strong><span id="humidity">-</span></p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
